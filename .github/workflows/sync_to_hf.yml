name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  # 允许在 GitHub Actions 界面上手动触发同步
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 设置远程仓库地址，包含认证 Token
          git remote add hf https://frankmes:$HF_TOKEN@huggingface.co/spaces/frankmes/welding-rag-system
          
          # 强制推送到 Hugging Face 的 main 分支
          git push --force hf main
