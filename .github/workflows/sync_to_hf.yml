name: Sync to Hugging Face
on:
  push:
    branches: [main]
  # 允许手动触发同步
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 步骤说明：将远程仓库添加为名为 'hf' 的远程源，然后强制推送
          # 请将下方 <YOUR_HF_USERNAME> 修改为你的 Hugging Face 用户名
          git remote add hf https://YOUR_HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/YOUR_HF_USERNAME/Welding-Rag-System
          git push --force hf main
